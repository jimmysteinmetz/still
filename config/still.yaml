# Front-page briefing modules. Each renders only when it has something to say.
almanac:
  your_day:
    enabled: true
    weekdays_only: true
  weather:
    enabled: true
    label: New York
    lat: 40.7128
    lng: -74.0060
  # Followed teams. Each renders in the Scoreboard only when in-season (or with a
  # countdown ≤14 days before a season opener); off-season teams collapse away.
  # Data + crisp logos come from ESPN's public API (no key). `espn_path` is the
  # "<sport>/<league>" route and `espn_id` the team id — both visible in an ESPN
  # team URL, e.g. espn.com/nfl/team/_/name/ind → football/nfl, id 11.
  # `order` is the Scoreboard render position, shared with the series below —
  # teams and series are merged and sorted by it, so IndyCar (order 3) can sit
  # between Colts (2) and Indiana Football (4) instead of always trailing every
  # team (TASK-8). Desired order: IU Basketball, Colts, IndyCar, IU Football,
  # Pacers, Tottenham, 49ers.
  teams:
    - name: Indiana Hoosiers Basketball
      short: IU BB
      league: NCAA
      espn_path: basketball/mens-college-basketball
      espn_id: 84
      order: 1
    - name: Indianapolis Colts
      short: COLTS
      league: NFL
      espn_path: football/nfl
      espn_id: 11
      order: 2
    - name: Indiana Hoosiers Football
      short: IU FB
      league: NCAA
      espn_path: football/college-football
      espn_id: 84
      order: 4
    - name: Indiana Pacers
      short: PACERS
      league: NBA
      espn_path: basketball/nba
      espn_id: 11
      order: 5
    - name: Tottenham Hotspur
      short: SPURS
      league: EPL
      espn_path: soccer/eng.1
      espn_id: 367
      order: 6
    - name: San Francisco 49ers
      short: 49ERS
      league: NFL
      espn_path: football/nfl
      espn_id: 25
      order: 7

  # Motorsport series — next race location only (no opponent), from an ESPN racing
  # scoreboard. `espn_path` is "racing/<league>" (IndyCar = racing/irl). `order`
  # shares the same sequence as teams above.
  series:
    - name: IndyCar
      short: INDYCAR
      espn_path: racing/irl
      order: 3
  french_holidays:
    enabled: false                # deferred to v1.1 (spec §10)
  sports_week:
    enabled: false                # deferred to v1.1 (spec §10)

  # Rotating "Margin" lessons — short, timeless explainers that sit between the
  # pressing stories and the rest. Code rotates the deck deterministically by
  # edition number; the editorial LLM writes `per_edition` of them each day.
  # Add/remove/reorder topics freely — known keys get a richer brief, any other
  # string is used as-is. (See still/pipeline/lessons.py for the known keys.)
  lessons:
    enabled: true
    per_edition: 2
    deck:
      - cybersecurity
      - french_culture
      - philosophy
      - ny_knowledge
      - sports_trivia
      - vocabulary
      - world_history

  # Upcoming NYC-metro shows for your bands. Boxed card under the Scoreboard.
  # Data: SeatGeek API — needs a free client_id in the SEATGEEK_CLIENT_ID env var
  # (https://seatgeek.com/account/develop). Without it the card just hides.
  # Default geo is NYC (40.7128, -74.006) within range_mi.
  shows:
    enabled: true
    range_mi: 40
    artists:
      # Top 25 from scripts/spotify_pull.py (2026-07-18, long-term weighted),
      # plus two hand-picked keepers at the end.
      - Bon Iver
      - Lizzy McAlpine
      - Sigur Rós
      - Jack White
      - Ben Folds Five
      - Grace Enger
      - Vulfmon
      - Bleachers
      - Lawrence
      - Margaret Glaspy
      - John Mayer
      - Jacob Collier
      - Death Cab for Cutie
      - Maisie Peters
      - Couch
      - Vampire Weekend
      - slimdan
      - Arctic Monkeys
      - Jimi Hendrix
      - Olivia Rodrigo
      - Phoebe Bridgers
      - Carole King
      - The Format
      - Lake Street Dive
      - Vulfpeck
      - Theo Katzman
      - Cory Wong

