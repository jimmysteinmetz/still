# =============================================================================
# still — edition configuration
#
# This file IS the user interface. Add/remove sources, follow/unfollow teams,
# add interests, and tune quotas by editing it directly.
#
# After editing, verify with:   uv run still config check
#
# Source `class` controls how hard the editorial filter works:
#   trusted  — individual blogs / low-frequency newsletters; pass through
#              near-verbatim, light summarization, long-form welcome.
#   firehose — high-volume aggregators (HN, Reddit, arXiv); hard pre-filters
#              (points/upvotes/recency) then an LLM pass keeps only what
#              matches your interests.
#
# Remember the product tenet: the finite budget IS the product. The caps below
# were deliberately raised once for a dense TWO-PAGE edition — still finite, no
# "load more". Don't creep them up further to paper over selection problems.
# (spec §2, §12)
# =============================================================================

edition:
  timezone: America/New_York
  weekday:
    max_items: 24       # TODO(two-page): tuned generously for two pages; revisit after a live run
  weekend:
    max_items: 10       # TODO(two-page): one long-read + supporting hits over two pages; revisit
    long_read: true
    day: saturday        # sat vs sun still open per spec §12 — flip freely
  dedup_lookback_days: 7  # "recently covered" window fed to the editorial prompt (TASK-3)

# Free-text topics the editorial LLM matches candidates against.
# Add or remove lines; phrasing matters more than keywords.
interests:
  - LLM engineering, evals, and agentic systems
  - AI research that matters in practice (not incremental benchmarks)
  - GCP, data engineering, and cloud infrastructure
  - Python and developer tooling
  - Cooking and recipes worth actually making
  - Guitar and vintage gear
  - Indie, indie-pop, jazz-funk and singer-songwriter music — Bon Iver,
    Lizzy McAlpine, Sigur Rós, Jack White, Ben Folds Five, Grace Enger,
    Vulfmon, Bleachers, Lawrence, Margaret Glaspy, John Mayer, Jacob Collier,
    Death Cab for Cutie, Maisie Peters, Couch, Vampire Weekend, slimdan,
    Arctic Monkeys, Jimi Hendrix, Olivia Rodrigo, Phoebe Bridgers, Carole King,
    The Format, Lake Street Dive, Vulfpeck, Theo Katzman, Cory Wong and
    affiliated acts; new releases and NYC-area shows
  - My sports teams — Tottenham Hotspur, San Francisco 49ers, Indianapolis Colts,
    Indiana Hoosiers, Indiana Pacers, and IndyCar
  - New York City — interesting places to visit, neighborhood history, museums,
    parks, and notable restaurant openings

# Ordered (this is the print order). Each section has its own quota so no firehose
# dominates. Quotas sum above the edition cap on purpose so the global max_items
# binds and the editor picks the best across a now-broad pool. (spec §4B)
sections:
  - id: ai
    title: AI & LLMs
    max_items: 6
  - id: eng
    title: Engineering & Tech
    max_items: 8
    style: >-
      Write for a smart non-specialist. Avoid unexplained jargon and acronyms —
      spell out or skip terms like "bytecode VM" rather than assuming the
      reader already knows them. For security/vulnerability stories
      specifically, lead with the plain-English impact (what broke, who is
      at risk) before the technical mechanism.
  - id: cloud
    title: Cloud / GCP
    max_items: 3
  - id: sports
    title: Sports
    max_items: 5
  - id: music
    title: Music & Shows
    max_items: 5
  - id: nyc
    title: New York
    max_items: 5
  - id: personal
    title: Personal
    max_items: 3

